name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run validate:puzzles
      - run: npm run validate:messages
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run build
        env:
          DEEPSEEK_API_KEY: "ci-fake-key-not-used-during-build"

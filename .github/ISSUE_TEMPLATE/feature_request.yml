name: Feature request
description: Suggest a product or engineering improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or maintainer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and any alternatives considered.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Product / UX
        - Puzzle content
        - AI coach
        - i18n
        - Auth / storage
        - Payments
        - Infrastructure
        - Documentation
        - Other
  - type: textarea
    id: notes
    attributes:
      label: Additional context

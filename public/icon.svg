<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0a0a0a"/>
  <g transform="translate(96, 96)">
    <!-- Board grid -->
    <g stroke="#00f2ff" stroke-width="2" opacity="0.5">
      <line x1="0" y1="0" x2="320" y2="0"/>
      <line x1="0" y1="80" x2="320" y2="80"/>
      <line x1="0" y1="160" x2="320" y2="160"/>
      <line x1="0" y1="240" x2="320" y2="240"/>
      <line x1="0" y1="320" x2="320" y2="320"/>
      <line x1="0" y1="0" x2="0" y2="320"/>
      <line x1="80" y1="0" x2="80" y2="320"/>
      <line x1="160" y1="0" x2="160" y2="320"/>
      <line x1="240" y1="0" x2="240" y2="320"/>
      <line x1="320" y1="0" x2="320" y2="320"/>
    </g>
    <!-- Star points -->
    <circle cx="80" cy="80" r="6" fill="#00f2ff" opacity="0.6"/>
    <circle cx="240" cy="80" r="6" fill="#00f2ff" opacity="0.6"/>
    <circle cx="160" cy="160" r="6" fill="#00f2ff" opacity="0.6"/>
    <circle cx="80" cy="240" r="6" fill="#00f2ff" opacity="0.6"/>
    <circle cx="240" cy="240" r="6" fill="#00f2ff" opacity="0.6"/>
    <!-- Black stone -->
    <circle cx="80" cy="80" r="32" fill="#1a1a1a" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <!-- White stone -->
    <circle cx="240" cy="240" r="32" fill="#f6f4ee" stroke="rgba(0,0,0,0.15)" stroke-width="1"/>
    <!-- Accent stone -->
    <circle cx="160" cy="160" r="28" fill="#00f2ff" opacity="0.85"/>
  </g>
</svg>
